<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,600&display=swap');
  html,body { margin:0; padding:0; background:transparent; }
  #icon {
    position:relative; width:1024px; height:1024px;
    border-radius:22.5%;
    background:linear-gradient(160deg,#2b3240 0%,#161a21 100%);
    box-shadow: inset 0 2px 0 rgba(255,255,255,.08);
    display:flex; align-items:center; justify-content:center; overflow:hidden;
  }
  #seam {
    position:absolute; top:0; bottom:0; left:50%; width:3px; transform:translateX(-1.5px);
    background:linear-gradient(180deg,rgba(255,255,255,0) 0%,rgba(255,255,255,.16) 50%,rgba(255,255,255,0) 100%);
  }
  #glyph {
    font-family:'Newsreader',Georgia,serif; font-weight:600; font-size:720px; line-height:1;
    background:linear-gradient(90deg,#ff5b51 0 50%,#3ad265 50% 100%);
    -webkit-background-clip:text; background-clip:text; color:transparent;
    transform:translateY(-20px);
  }
</style>
</head>
<body>
  <div id="icon"><div id="seam"></div><div id="glyph">δ</div></div>
</body>
</html>
